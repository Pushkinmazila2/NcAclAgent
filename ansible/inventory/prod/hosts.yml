---
# Prod инвентарь
# Секреты (ansible_password, vault_*) — в host_vars/<hostname>/vault.yml (зашифровано Vault)

all:
  children:
    prod:
      vars:
        # Режим агента
        agent_mode: "Prod"

        # Общие параметры подключения для всех prod хостов
        ansible_connection: ssh
        ansible_shell_type: powershell
        ansible_shell_executable: None

      hosts:
        # Файловый сервер 1 — основная шара финансов
        fileserver01.company.local:
          ansible_host: 10.0.1.10
          ansible_user: svc_ansible

          # Пути специфичные для этого сервера
          agent_allowed_paths:
            - "\\\\FILESERVER01\\Finance"
            - "\\\\FILESERVER01\\HR"
          agent_denied_paths:
            - "\\\\FILESERVER01\\Finance\\Confidential"

          # Сетевые параметры агента
          agent_listen_ip: "10.0.1.10"
          agent_listen_port: 8443

          # Сервисный аккаунт для запуска агента (пароль в vault)
          agent_service_account: "COMPANY\\svc_ncaclagent_fs01"

        # Файловый сервер 2 — шары IT и разработки
        fileserver02.company.local:
          ansible_host: 10.0.1.11
          ansible_user: svc_ansible

          agent_allowed_paths:
            - "\\\\FILESERVER02\\IT"
            - "\\\\FILESERVER02\\Development"
            - "\\\\FILESERVER02\\Infrastructure"
          agent_denied_paths: []

          agent_listen_ip: "10.0.1.11"
          agent_listen_port: 8443
          agent_service_account: "COMPANY\\svc_ncaclagent_fs02"
