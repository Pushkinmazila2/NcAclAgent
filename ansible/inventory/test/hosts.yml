---
# Test инвентарь

all:
  children:
    test:
      vars:
        agent_mode: "Test"

        ansible_connection: ssh
        ansible_shell_type: powershell
        ansible_shell_executable: None

      hosts:
        testserver01.lab.local:
          ansible_host: 192.168.100.10
          ansible_user: svc_ansible

          agent_allowed_paths:
            - "C:\\TestShare"
            - "C:\\TestShare2"
          agent_denied_paths:
            - "C:\\TestShare\\Confidential"

          agent_listen_ip: "192.168.100.10"
          agent_listen_port: 8443
          agent_service_account: "LAB\\svc_ncaclagent"
