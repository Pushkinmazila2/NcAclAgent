[defaults]
# Путь к ролям относительно ansible/
roles_path          = roles

# Не собираем лишние факты (ускоряет работу)
gathering           = smart
fact_caching        = memory

# Параллельность
forks               = 5

# Логирование
log_path            = /tmp/ansible-ncaclagent.log

# Таймаут SSH соединения
timeout             = 30

# Не показывать предупреждения о cowsay
nocows              = 1

# Vault (пароль задаётся через --vault-password-file или env ANSIBLE_VAULT_PASSWORD_FILE)
# vault_password_file = ~/.vault_pass

[ssh_connection]
# Для Windows через SSH — отключаем ControlMaster (несовместим с PowerShell)
ssh_args            = -o ControlMaster=no -o StrictHostKeyChecking=no
pipelining          = false

[privilege_escalation]
# На Windows не нужен sudo
become              = false
