name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Пометить как pre-release'
        required: false
        default: true
        type: boolean

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'src/NcAclAgent.Api/NcAclAgent.Api.csproj'
  PUBLISH_DIR:    'publish'
  ARTIFACT_NAME:  'NcAclAgent'

jobs:
  build:
    name: Build & Publish (win-x64, self-contained)
    runs-on: ubuntu-latest

    outputs:
      version:       ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.artifact.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Определяем версию
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.$(date +%Y%m%d).$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Версия: ${VERSION}"

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore NcAclAgent.sln

      - name: Build (проверка компиляции)
        run: |
          dotnet build NcAclAgent.sln \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.version }}

      - name: Run tests
        id: tests
        # Пропускаем если папка tests пустая — нет проектов
        run: |
          TEST_PROJECTS=$(find tests -name "*.csproj" 2>/dev/null | head -1)
          if [ -z "$TEST_PROJECTS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Тестовых проектов нет — пропускаем"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            dotnet test NcAclAgent.sln \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=test-results.trx" \
              --results-directory ./test-results
          fi

      - name: Publish test results
        # Запускаем ТОЛЬКО если тесты действительно запускались
        if: steps.tests.outputs.skip == 'false'
        uses: dorny/test-reporter@v2
        with:
          name:     '.NET Tests'
          path:     'test-results/*.trx'
          reporter: 'dotnet-trx'

      - name: Publish — win-x64 self-contained single file
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ${{ env.PUBLISH_DIR }}

      - name: Добавляем скрипты и документацию
        run: |
          cp installer/Setup-TestEnvironment.ps1  ${{ env.PUBLISH_DIR }}/
          cp installer/Install-NcAclAgent.ps1     ${{ env.PUBLISH_DIR }}/
          cp README.md                             ${{ env.PUBLISH_DIR }}/
          echo "${{ steps.version.outputs.version }}" > ${{ env.PUBLISH_DIR }}/VERSION

          echo "Содержимое артефакта:"
          ls -lh ${{ env.PUBLISH_DIR }}/

      - name: Создаём zip архив
        id: artifact
        run: |
          ARTIFACT="${{ env.ARTIFACT_NAME }}-${{ steps.version.outputs.version }}-win-x64"
          cd ${{ env.PUBLISH_DIR }}
          zip -r "../${ARTIFACT}.zip" .
          echo "name=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          ls -lh "../${ARTIFACT}.zip"

      - name: Загружаем артефакт
        uses: actions/upload-artifact@v4
        with:
          name:           ${{ steps.artifact.outputs.name }}
          path:           ${{ steps.artifact.outputs.name }}.zip
          retention-days: 7

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Скачиваем артефакт
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./dist

      - name: Генерируем release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" --no-merges > release-notes.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges | head -20 > release-notes.md
          fi

          cat >> release-notes.md << 'EOF'

          ---
          **Быстрый старт (Test режим):**
          ```powershell
          Expand-Archive NcAclAgent-*.zip -DestinationPath C:\NcAclAgent
          cd C:\NcAclAgent
          .\Setup-TestEnvironment.ps1
          $env:NCACL_MODE = "Test"
          .\NcAclAgent.Api.exe
          ```
          EOF

      - name: Создаём GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "NcAclAgent ${{ needs.build.outputs.version }}"
          body_path:  release-notes.md
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files:      dist/${{ needs.build.outputs.artifact_name }}.zip
